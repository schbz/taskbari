name: Publish Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run compile

      - name: Package extension
        run: npx vsce package --out taskbari.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskbari-vsix
          path: taskbari.vsix

      - name: Publish to Open VSX
        run: npx ovsx publish taskbari.vsix --skip-duplicate
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath taskbari.vsix --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
